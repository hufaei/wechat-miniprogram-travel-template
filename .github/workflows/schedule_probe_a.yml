name: Schedule Probe A

on:
  workflow_dispatch:
  schedule:
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: No-op probe
        run: |
          echo "probe=a"
          echo "version=2"
          echo "event=${{ github.event_name }}"
          date -u
