name: Schedule Probe A

on:
  workflow_dispatch:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: No-op probe
        run: |
          echo "probe=a"
          echo "event=${{ github.event_name }}"
          date -u
