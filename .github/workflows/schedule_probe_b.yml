name: Schedule Probe B

on:
  workflow_dispatch:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: No-op probe
        run: |
          echo "probe=b"
          echo "version=2"
          echo "event=${{ github.event_name }}"
          date -u
